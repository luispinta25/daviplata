<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cargando DaviPlata...</title>
    <style>
        body {
            background-color: #40403F;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Inter', sans-serif;
            color: white;
        }
        .loader {
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-left-color: #D96B2B;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
    <script>
        function checkDevice() {
            const width = window.innerWidth;
            const userAgent = navigator.userAgent.toLowerCase();
            const isMobileUA = /mobile|android|iphone|ipad|tablet/i.test(userAgent);
            
            // Si la pantalla es mayor a 992px Y no es explícitamente un dispositivo táctil móvil forzado
            if (width >= 992 && !isMobileUA) {
                window.location.href = 'desktop.html';
            } else {
                window.location.href = 'mobile.html';
            }
        }
        
        // Ejecutar inmediatamente
        checkDevice();
        
        // También manejar cambios de redimensión si el usuario está en el index (aunque suele redireccionar antes)
        window.addEventListener('resize', checkDevice);
    </script>
</head>
<body>
    <div class="loader"></div>
</body>
</html>
